<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CFG — evaluateLoan() | LoanApprovalSystem | V(G)=7</title>
<desc>Control Flow Graph pentru metoda evaluateLoan(). 4 noduri de decizie, 7 circuite independente.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .lbl { font-size: 13px; font-weight: 600; }
    .sub { font-size: 11px; }
    .edge { stroke: #1a1a1a; stroke-width: 0.8; fill: none; }
    .edge-dash { stroke: #1a1a1a; stroke-width: 0.8; fill: none; stroke-dasharray: 5 3; }
    .node-round { fill: #f0f0f0; stroke: #1a1a1a; stroke-width: 1; }
    .node-rect  { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1; }
    .node-diam  { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1; }
  </style>
</defs>

<!-- START (rounded) -->
<rect class="node-round" x="270" y="18" width="140" height="36" rx="18"/>
<text class="lbl" x="340" y="36" text-anchor="middle" dominant-baseline="central">START</text>
<line class="edge" x1="340" y1="54" x2="340" y2="84" marker-end="url(#arr)"/>

<!-- N1: varsta — diamond shape via polygon -->
<polygon class="node-diam" points="340,84 450,118 340,152 230,118"/>
<text class="lbl" x="340" y="112" text-anchor="middle" dominant-baseline="central">Verificare vârstă</text>
<text class="sub" x="340" y="132" text-anchor="middle" dominant-baseline="central">age &lt; 18 || age &gt; 65</text>
<line class="edge" x1="230" y1="118" x2="88" y2="118" marker-end="url(#arr)"/>
<text class="sub" x="165" y="110" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="152" x2="340" y2="192" marker-end="url(#arr)"/>
<text class="sub" x="354" y="175" text-anchor="start">FALSE</text>

<!-- R1 -->
<rect class="node-rect" x="30" y="96" width="58" height="44" rx="4"/>
<text class="lbl" x="59" y="114" text-anchor="middle" dominant-baseline="central">R1</text>
<text class="sub" x="59" y="130" text-anchor="middle" dominant-baseline="central">Respins</text>

<!-- N2: credit -->
<polygon class="node-diam" points="340,192 450,226 340,260 230,226"/>
<text class="lbl" x="340" y="220" text-anchor="middle" dominant-baseline="central">Verificare credit</text>
<text class="sub" x="340" y="240" text-anchor="middle" dominant-baseline="central">creditScore &lt; 600</text>
<line class="edge" x1="230" y1="226" x2="88" y2="226" marker-end="url(#arr)"/>
<text class="sub" x="165" y="218" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="260" x2="340" y2="300" marker-end="url(#arr)"/>
<text class="sub" x="354" y="283" text-anchor="start">FALSE</text>

<!-- R2 -->
<rect class="node-rect" x="30" y="204" width="58" height="44" rx="4"/>
<text class="lbl" x="59" y="222" text-anchor="middle" dominant-baseline="central">R2</text>
<text class="sub" x="59" y="238" text-anchor="middle" dominant-baseline="central">Respins</text>

<!-- N3: intarzieri -->
<polygon class="node-diam" points="340,300 450,334 340,368 230,334"/>
<text class="lbl" x="340" y="328" text-anchor="middle" dominant-baseline="central">Verificare întârzieri</text>
<text class="sub" x="340" y="348" text-anchor="middle" dominant-baseline="central">latePaymentsCount &gt; 3</text>
<line class="edge" x1="230" y1="334" x2="88" y2="334" marker-end="url(#arr)"/>
<text class="sub" x="165" y="326" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="368" x2="340" y2="408" marker-end="url(#arr)"/>
<text class="sub" x="354" y="391" text-anchor="start">FALSE</text>

<!-- R3 -->
<rect class="node-rect" x="30" y="312" width="58" height="44" rx="4"/>
<text class="lbl" x="59" y="330" text-anchor="middle" dominant-baseline="central">R3</text>
<text class="sub" x="59" y="346" text-anchor="middle" dominant-baseline="central">Respins</text>

<!-- N4: DTI -->
<polygon class="node-diam" points="340,408 450,442 340,476 230,442"/>
<text class="lbl" x="340" y="436" text-anchor="middle" dominant-baseline="central">Verificare DTI</text>
<text class="sub" x="340" y="456" text-anchor="middle" dominant-baseline="central">debts/salary &gt; 0.40</text>
<line class="edge" x1="230" y1="442" x2="88" y2="442" marker-end="url(#arr)"/>
<text class="sub" x="165" y="434" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="476" x2="340" y2="516" marker-end="url(#arr)"/>
<text class="sub" x="354" y="499" text-anchor="start">FALSE</text>

<!-- R4 -->
<rect class="node-rect" x="30" y="420" width="58" height="44" rx="4"/>
<text class="lbl" x="59" y="438" text-anchor="middle" dominant-baseline="central">R4</text>
<text class="sub" x="59" y="454" text-anchor="middle" dominant-baseline="central">Respins</text>

<!-- R1-R4 merge line left -->
<line class="edge-dash" x1="30" y1="118" x2="18" y2="118"/>
<line class="edge-dash" x1="18" y1="118" x2="18" y2="560"/>
<line class="edge" x1="18" y1="560" x2="64" y2="560" marker-end="url(#arr)"/>

<!-- REJECTED box -->
<rect class="node-rect" x="64" y="538" width="120" height="44" rx="4"/>
<text class="lbl" x="124" y="556" text-anchor="middle" dominant-baseline="central">REJECTED</text>
<text class="sub" x="124" y="572" text-anchor="middle" dominant-baseline="central">return LoanDecision</text>

<!-- N5: dobanda tier1 -->
<rect class="node-rect" x="210" y="516" width="260" height="52" rx="4"/>
<text class="lbl" x="340" y="536" text-anchor="middle" dominant-baseline="central">Calcul dobândă — tier 1</text>
<text class="sub" x="340" y="556" text-anchor="middle" dominant-baseline="central">creditScore &gt;= 750 ?</text>
<line class="edge" x1="470" y1="542" x2="560" y2="542" marker-end="url(#arr)"/>
<text class="sub" x="515" y="534" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="568" x2="340" y2="608" marker-end="url(#arr)"/>
<text class="sub" x="354" y="591" text-anchor="start">FALSE</text>

<!-- P5: 5% -->
<rect class="node-rect" x="560" y="520" width="100" height="44" rx="4"/>
<text class="lbl" x="610" y="538" text-anchor="middle" dominant-baseline="central">5.0%</text>
<text class="sub" x="610" y="554" text-anchor="middle" dominant-baseline="central">Circuit P5</text>

<!-- N6: dobanda tier2 -->
<rect class="node-rect" x="210" y="608" width="260" height="52" rx="4"/>
<text class="lbl" x="340" y="628" text-anchor="middle" dominant-baseline="central">Calcul dobândă — tier 2</text>
<text class="sub" x="340" y="648" text-anchor="middle" dominant-baseline="central">creditScore &gt;= 650 ?</text>
<line class="edge" x1="470" y1="634" x2="560" y2="634" marker-end="url(#arr)"/>
<text class="sub" x="515" y="626" text-anchor="middle">TRUE</text>
<line class="edge" x1="340" y1="660" x2="340" y2="700" marker-end="url(#arr)"/>
<text class="sub" x="354" y="683" text-anchor="start">FALSE</text>

<!-- P6: 7% -->
<rect class="node-rect" x="560" y="612" width="100" height="44" rx="4"/>
<text class="lbl" x="610" y="630" text-anchor="middle" dominant-baseline="central">7.0%</text>
<text class="sub" x="610" y="646" text-anchor="middle" dominant-baseline="central">Circuit P6</text>

<!-- P7: 10% -->
<rect class="node-rect" x="282" y="700" width="116" height="44" rx="4"/>
<text class="lbl" x="340" y="718" text-anchor="middle" dominant-baseline="central">10.0%</text>
<text class="sub" x="340" y="734" text-anchor="middle" dominant-baseline="central">Circuit P7</text>

<!-- P5, P6, P7 merge -->
<line class="edge-dash" x1="610" y1="564" x2="610" y2="790"/>
<line class="edge-dash" x1="610" y1="656" x2="610" y2="790"/>
<line class="edge" x1="340" y1="744" x2="340" y2="790" marker-end="url(#arr)"/>
<line class="edge" x1="340" y1="790" x2="485" y2="790" marker-end="url(#arr)"/>

<!-- Calcul suma maxima -->
<rect class="node-rect" x="370" y="768" width="270" height="52" rx="4"/>
<text class="lbl" x="505" y="788" text-anchor="middle" dominant-baseline="central">Calcul sumă maximă</text>
<text class="sub" x="505" y="808" text-anchor="middle" dominant-baseline="central">(salary*0.4 - debts) * 60</text>
<line class="edge" x1="505" y1="820" x2="505" y2="858" marker-end="url(#arr)"/>

<!-- APPROVED -->
<rect class="node-rect" x="395" y="858" width="220" height="44" rx="4"/>
<text class="lbl" x="505" y="876" text-anchor="middle" dominant-baseline="central">APPROVED</text>
<text class="sub" x="505" y="892" text-anchor="middle" dominant-baseline="central">return LoanDecision(true)</text>
<line class="edge" x1="505" y1="902" x2="505" y2="930" marker-end="url(#arr)"/>
<line class="edge" x1="124" y1="582" x2="124" y2="930"/>
<line class="edge" x1="124" y1="930" x2="298" y2="930" marker-end="url(#arr)"/>

<!-- END -->
<rect class="node-round" x="298" y="918" width="220" height="36" rx="18"/>
<text class="lbl" x="408" y="936" text-anchor="middle" dominant-baseline="central">END</text>

<!-- Legend -->
<rect x="40" y="955" width="600" height="18" rx="4" fill="none" stroke="#ccc" stroke-width="0.5"/>
<text class="sub" x="340" y="968" text-anchor="middle">V(G)=7 | P1-P4: rejected | P5: score≥750→5% | P6: score≥650→7% | P7: score≥600→10%</text>
</svg>
