<svg width="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Diagrama UML — LoanApprovalSystem</title>
<desc>Clasele Customer, LoanDecision, LoanApprovalSystem, Main, LoanApprovalSystemTest cu relatiile dintre ele.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .lbl  { font-size: 13px; font-weight: 700; }
    .sub  { font-size: 11px; }
    .mono { font-size: 11px; font-family: 'Courier New', monospace; }
    .hdr  { fill: #e8e8e8; stroke: #1a1a1a; stroke-width: 1; }
    .body { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1; }
    .dep  { stroke: #1a1a1a; stroke-width: 0.8; fill: none; stroke-dasharray: 6 3; }
    .div  { stroke: #1a1a1a; stroke-width: 0.5; }
  </style>
</defs>

<!-- ─── Customer ──────────────────────────── -->
<text class="sub" x="145" y="26" text-anchor="middle" fill="#555">«immutable»</text>
<rect class="hdr" x="30" y="32" width="230" height="28" rx="0"/>
<text class="lbl" x="145" y="46" text-anchor="middle" dominant-baseline="central">Customer</text>
<line class="div" x1="30" y1="60" x2="260" y2="60"/>
<rect class="body" x="30" y="60" width="230" height="100" rx="0"/>
<text class="mono" x="44" y="78" dominant-baseline="central">- age : int</text>
<text class="mono" x="44" y="96" dominant-baseline="central">- creditScore : int</text>
<text class="mono" x="44" y="114" dominant-baseline="central">- latePaymentsCount : int</text>
<text class="mono" x="44" y="132" dominant-baseline="central">- netSalary : double</text>
<text class="mono" x="44" y="150" dominant-baseline="central">- monthlyDebts : double</text>
<line class="div" x1="30" y1="160" x2="260" y2="160"/>
<rect class="body" x="30" y="160" width="230" height="100" rx="0"/>
<text class="mono" x="44" y="178" dominant-baseline="central">+ Customer(age, score, ...)</text>
<text class="mono" x="44" y="196" dominant-baseline="central">+ getAge() : int</text>
<text class="mono" x="44" y="214" dominant-baseline="central">+ getCreditScore() : int</text>
<text class="mono" x="44" y="232" dominant-baseline="central">+ getNetSalary() : double</text>
<text class="mono" x="44" y="250" dominant-baseline="central">+ toString() : String</text>
<rect x="29" y="31" width="232" height="230" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>

<!-- ─── LoanDecision ──────────────────────── -->
<text class="sub" x="535" y="26" text-anchor="middle" fill="#555">«immutable»</text>
<rect class="hdr" x="420" y="32" width="230" height="28" rx="0"/>
<text class="lbl" x="535" y="46" text-anchor="middle" dominant-baseline="central">LoanDecision</text>
<line class="div" x1="420" y1="60" x2="650" y2="60"/>
<rect class="body" x="420" y="60" width="230" height="100" rx="0"/>
<text class="mono" x="434" y="78" dominant-baseline="central">- approved : boolean</text>
<text class="mono" x="434" y="96" dominant-baseline="central">- interestRate : double</text>
<text class="mono" x="434" y="114" dominant-baseline="central">- maxLoanAmount : double</text>
<text class="mono" x="434" y="132" dominant-baseline="central">- rejectionReason : String</text>
<line class="div" x1="420" y1="160" x2="650" y2="160"/>
<rect class="body" x="420" y="160" width="230" height="120" rx="0"/>
<text class="mono" x="434" y="178" dominant-baseline="central">+ LoanDecision(approved, ...)</text>
<text class="mono" x="434" y="196" dominant-baseline="central">+ isApproved() : boolean</text>
<text class="mono" x="434" y="214" dominant-baseline="central">+ getInterestRate() : double</text>
<text class="mono" x="434" y="232" dominant-baseline="central">+ getMaxLoanAmount() : double</text>
<text class="mono" x="434" y="250" dominant-baseline="central">+ toString() : String</text>
<rect x="419" y="31" width="232" height="250" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>

<!-- ─── LoanApprovalSystem ─────────────────── -->
<text class="sub" x="340" y="310" text-anchor="middle" fill="#555">«business logic»</text>
<rect class="hdr" x="200" y="316" width="280" height="28" rx="0"/>
<text class="lbl" x="340" y="330" text-anchor="middle" dominant-baseline="central">LoanApprovalSystem</text>
<line class="div" x1="200" y1="344" x2="480" y2="344"/>
<rect class="body" x="200" y="344" width="280" height="22" rx="0"/>
<text class="sub" x="216" y="356" dominant-baseline="central">(no fields)</text>
<line class="div" x1="200" y1="366" x2="480" y2="366"/>
<rect class="body" x="200" y="366" width="280" height="44" rx="0"/>
<text class="mono" x="216" y="384" dominant-baseline="central">+ evaluateLoan(c: Customer)</text>
<text class="mono" x="216" y="400" dominant-baseline="central">      : LoanDecision</text>
<rect x="199" y="315" width="282" height="96" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>

<!-- ─── Main ──────────────────────────────── -->
<text class="sub" x="105" y="432" text-anchor="middle" fill="#555">«demo»</text>
<rect class="hdr" x="30" y="438" width="150" height="28" rx="0"/>
<text class="lbl" x="105" y="452" text-anchor="middle" dominant-baseline="central">Main</text>
<line class="div" x1="30" y1="466" x2="180" y2="466"/>
<rect class="body" x="30" y="466" width="150" height="22" rx="0"/>
<text class="sub" x="44" y="478" dominant-baseline="central">(no fields)</text>
<line class="div" x1="30" y1="488" x2="180" y2="488"/>
<rect class="body" x="30" y="488" width="150" height="28" rx="0"/>
<text class="mono" x="44" y="504" dominant-baseline="central">+ main(args) : void</text>
<rect x="29" y="437" width="152" height="80" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>

<!-- ─── LoanApprovalSystemTest ──────────────── -->
<text class="sub" x="556" y="432" text-anchor="middle" fill="#555">«JUnit 5»</text>
<rect class="hdr" x="452" y="438" width="214" height="28" rx="0"/>
<text class="lbl" x="559" y="452" text-anchor="middle" dominant-baseline="central">LoanApprovalSystemTest</text>
<line class="div" x1="452" y1="466" x2="666" y2="466"/>
<rect class="body" x="452" y="466" width="214" height="22" rx="0"/>
<text class="mono" x="466" y="478" dominant-baseline="central">- system: LoanApprovalSystem</text>
<line class="div" x1="452" y1="488" x2="666" y2="488"/>
<rect class="body" x="452" y="488" width="214" height="44" rx="0"/>
<text class="mono" x="466" y="506" dominant-baseline="central">+ equivalencePartitioning()</text>
<text class="mono" x="466" y="524" dominant-baseline="central">+ boundaryValueAnalysis() ...</text>
<rect x="451" y="437" width="216" height="96" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>

<!-- ─── Relationships ──────────────────────── -->
<!-- LAS uses Customer -->
<line class="dep" x1="200" y1="350" x2="155" y2="262" marker-end="url(#arr)"/>
<text class="sub" x="153" y="310" text-anchor="middle" fill="#555" transform="rotate(-28,153,310)">«uses»</text>

<!-- LAS creates LoanDecision -->
<line class="dep" x1="480" y1="350" x2="525" y2="282" marker-end="url(#arr)"/>
<text class="sub" x="516" y="320" fill="#555" transform="rotate(68,516,320)">«creates»</text>

<!-- Main uses LAS -->
<line class="dep" x1="180" y1="472" x2="200" y2="440" marker-end="url(#arr)"/>
<text class="sub" x="172" y="454" text-anchor="end" fill="#555">«uses»</text>

<!-- Test tests LAS -->
<line class="dep" x1="452" y1="472" x2="478" y2="440" marker-end="url(#arr)"/>
<text class="sub" x="460" y="454" fill="#555">«tests»</text>

<!-- Legend -->
<rect x="30" y="560" width="620" height="50" rx="4" fill="none" stroke="#aaa" stroke-width="0.5"/>
<text class="lbl" x="340" y="578" text-anchor="middle">Legendă</text>
<line class="dep" x1="50" y1="600" x2="100" y2="600" marker-end="url(#arr)"/>
<text class="sub" x="108" y="604">Dependență (uses / creates / tests)</text>
<rect x="290" y="592" width="14" height="14" rx="2" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="sub" x="312" y="602">Header clasă</text>
<rect x="410" y="592" width="14" height="14" rx="2" fill="#ffffff" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="sub" x="432" y="602">Câmpuri / Metode</text>
</svg>
